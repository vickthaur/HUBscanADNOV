<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADNOV TOUR | Hub Expérience</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #0a3f70;
            --accent: #2b40d3;
            --warning: #fdc533;
            --bg: #030712;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Animation de fond spectaculaire */
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(43, 64, 211, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(253, 197, 51, 0.05) 0%, transparent 40%);
        }

        .hub-container {
            width: 100%;
            max-width: 900px;
            padding: 40px;
            text-align: center;
            z-index: 1;
        }

        .header { margin-bottom: 60px; animation: fadeInDown 1s ease; }
        .header h1 { 
            font-size: clamp(32px, 5vw, 48px); 
            font-weight: 800; 
            letter-spacing: -2px; 
            background: linear-gradient(to right, #fff, #94a3b8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: var(--accent); font-weight: 700; letter-spacing: 4px; text-transform: uppercase; font-size: 12px; margin-top: 10px; }

        .demo-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 30px;
        }

        .hero-card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            padding: 40px;
            text-decoration: none;
            color: white;
            transition: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .hero-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, transparent 100%);
            opacity: 0;
            transition: 0.5s;
            z-index: -1;
        }

        .hero-card:hover {
            transform: translateY(-10px) scale(1.02);
            border-color: rgba(43, 64, 211, 0.5);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }

        .hero-card:hover::before { opacity: 0.1; }

        .icon-box {
            width: 70px; height: 70px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            display: flex; align-items: center; justify-content: center;
            font-size: 30px;
            margin-bottom: 25px;
            border: 1px solid var(--glass-border);
        }

        .card-title { font-size: 22px; font-weight: 700; margin-bottom: 12px; }
        .card-tag { 
            font-size: 10px; font-weight: 800; color: var(--warning); 
            text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px;
            background: rgba(253, 197, 51, 0.1); padding: 5px 12px; border-radius: 100px;
        }

        .btn-action {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            background: white;
            color: var(--bg);
            font-weight: 800;
            font-size: 14px;
            transition: 0.3s;
        }

        .hero-card:hover .btn-action { background: var(--warning); transform: scale(1.05); }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Décorations flottantes */
        .blob {
            position: absolute;
            width: 300px; height: 300px;
            background: var(--accent);
            filter: blur(80px);
            opacity: 0.1;
            z-index: 0;
            border-radius: 50%;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%); }
            to { transform: translate(10%, 10%); }
        }
    </style>
</head>
<body>

    <div class="blob"></div>

    <div class="hub-container">
        <div class="header">
            <p>Expérience Client & Staff</p>
            <h1>ADNOV TOUR</h1>
        </div>

        <div class="demo-grid">
            <a href="https://vickthaur.github.io/ADNOVTOUR/" class="hero-card">
                <div class="card-tag">Parcours Notaire</div>
                <div class="icon-box">✍️</div>
                <h2 class="card-title">Portail Inscription</h2>
                <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Interface d'acquisition de leads et génération de badges dynamiques.</p>
                <div class="btn-action">LANCER LA DÉMO</div>
            </a>

            <a href="https://vickthaur.github.io/ADNOVTOUR/scan.html" class="hero-card">
                <div class="card-tag">Parcours Staff</div>
                <div class="icon-box">📸</div>
                <h2 class="card-title">Terminal de Scan</h2>
                <p style="color: #94a3b8; font-size: 14px; margin-bottom: 25px;">Outil de contrôle d'accès intelligent avec validation Brevo en temps réel.</p>
                <div class="btn-action">ACTIVER LE SCANNER</div>
            </a>
        </div>
    </div>

</body>
</html>
